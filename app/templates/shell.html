<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Provenance{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz@0,16..72;1,16..72&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="/static/quiet.css">
</head>
<body>
{% set p = request.url.path %}
<div class="q-app">
  <!-- sidebar -->
  <aside class="q-side">
    <div class="q-ws"><span class="av">P</span>Provenance<i class="ph ph-caret-up-down ch"></i></div>
    <nav class="q-nav">
      <a class="q-ni {{ 'on' if p in ['/workspace','/'] else '' }}" href="/workspace"><i class="ph ph-house"></i>Home</a>
      <a class="q-ni {{ 'on' if p.startswith('/records') or p=='/workspace' else '' }}" href="/records"><i class="ph ph-table"></i>Records</a>
      <a class="q-ni {{ 'on' if p.startswith('/composer') else '' }}" href="/composer"><i class="ph ph-pen-nib"></i>Composer</a>
      <a class="q-ni {{ 'on' if p.startswith('/optimizer') else '' }}" href="/optimizer"><i class="ph ph-trend-up"></i>Optimizer</a>
      <a class="q-ni {{ 'on' if p.startswith('/agent') else '' }}" href="/agent"><i class="ph ph-sparkle"></i>Agent</a>
      <div class="q-sect q-label">Trust</div>
      <a class="q-ni {{ 'on' if p.startswith('/assurance') else '' }}" href="/assurance"><i class="ph ph-shield-check"></i>Assurance</a>
      <a class="q-ni {{ 'on' if p.startswith('/sources') else '' }}" href="/sources"><i class="ph ph-database"></i>Sources</a>
      <div class="q-sect q-label">Showcase</div>
      <a class="q-ni {{ 'on' if p.startswith('/demo') else '' }}" href="/demo"><i class="ph ph-monitor-play"></i>Live demo</a>
    </nav>
    <div class="q-side-foot">
      <a class="q-ni" href="/demo/monitor"><i class="ph ph-gauge"></i>KPI monitor</a>
    </div>
  </aside>

  <!-- main -->
  <div class="q-main">
    <header class="q-top">
      <div class="crumb">{% block crumb %}<i class="ph ph-house"></i> Home{% endblock %}</div>
      <a class="q-cmd" href="/agent"><i class="ph ph-magnifying-glass"></i> Ask or jump to&hellip; <kbd>⌘K</kbd></a>
    </header>
    <main class="q-body">{% block content %}{% endblock %}</main>
  </div>
</div>
</body>
</html>
